spring.application.name=example2

# === JPA / Hibernate: SQL 출력 및 포맷 설정 ===
# 콘솔에 실행되는 SQL을 출력합니다.
spring.jpa.show-sql=true
# 출력되는 SQL을 읽기 쉽도록 포맷합니다.
spring.jpa.properties.hibernate.format_sql=true
# Hibernate의 show_sql 속성도 명시적으로 활성화합니다.
spring.jpa.properties.hibernate.show_sql=true

# === Error 코드 처리용 ===
# spring.web.resources.add-mappings=false
# spring.mvc.dispatch-options-request=true

# === DDL 자동 적용 ===
# 개발용: 엔티티 변경 시 스키마를 자동으로 업데이트합니다. (주의: 운영환경에서는 신중히 사용)
spring.jpa.hibernate.ddl-auto=update
# validate: 엔티티와 DB 스키마가 일치하는지 검증합니다. 일치하지 않으면 애플리케이션이 시작되지 않습니다.
# none: DDL 자동 적용을 비활성화합니다. (기본값)
# create: 애플리케이션 시작 시 기존 테이블을 삭제하고 새로 생성합니다. (개발용)
# create-drop: 애플리케이션 시작 시 테이블을 생성하고, 종료 시 삭제합니다. (개발용)
# drop: 애플리케이션 시작 시 기존 테이블을 삭제합니다. (개발용)
# update: 애플리케이션 시작 시 엔티티 변경 사항을 반영하여 테이블을 업데이트합니다. (개발용)
# none, validate는 운영환경에서 권장되는 설정입니다. create, create-drop, drop, update는 개발환경에서만 사용해야 합니다.


# === 로깅 레벨 설정 ===
# 애플리케이션 전체 기본 로그 레벨을 INFO로 설정합니다.
logging.level.root=INFO
# Hibernate가 출력하는 SQL을 INFO 레벨로 기록합니다.
logging.level.org.hibernate.SQL=INFO
# 바인딩(파라미터) 로그를 TRACE로 기록합니다. (자세한 파라미터 값 확인용)
logging.level.org.hibernate.orm.jdbc.bind=TRACE
# 애플리케이션 예외 로그를 간결하게 출력하도록 설정합니다. (stack trace 대신 간단한 메시지만 출력)
logging.exception-conversion-word=%ex{short}

